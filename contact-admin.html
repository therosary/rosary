<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contact Admin — The Rosary</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0c1a28;--deep:#0f2035;--mid:#162840;--panel:#1a2f47;--gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:rgba(201,168,76,0.2);--white:#ffffff;--soft:#cccccc;--muted:#aaaaaa;--faint:#555555;--red:#e74c3c;--green:#2ecc71}
    body{font-family:'EB Garamond',serif;background:var(--navy);color:var(--white);min-height:100vh}
    .top-bar{height:3px;background:var(--gold)}
    .admin-header{background:var(--deep);border-bottom:1px solid var(--gold-dim);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
    .admin-logo{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;letter-spacing:.18em;color:var(--gold);text-decoration:none}
    .admin-logo span{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.8rem;font-weight:300;color:var(--soft);letter-spacing:.1em;margin-left:.6rem}
    .header-actions{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap}
    .header-link{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;color:var(--gold);text-decoration:none;border:1px solid var(--gold-dim);padding:.3rem .9rem;text-transform:uppercase;transition:background .2s}
    .header-link:hover{background:var(--gold-dim)}
    .page-body{padding:2rem}
    .page-title{font-family:'Cinzel',serif;font-size:1.05rem;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:.75rem}
    .page-heading{font-size:2rem;line-height:1.1;margin-bottom:1rem}
    .page-intro{max-width:760px;color:var(--soft);margin-bottom:2rem}
    .summary-grid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:1rem;margin-bottom:1.75rem}
    .summary-card{background:var(--mid);border:1px solid var(--gold-dim);padding:1.2rem}
    .summary-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem;display:block}
    .summary-value{font-size:2rem;color:var(--white);font-family:'Cormorant Garamond',serif}
    .btn-refresh{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;padding:.85rem 1.1rem;background:var(--gold);color:var(--navy);border:none;cursor:pointer;transition:background .25s}
    .btn-refresh:hover{background:var(--gold-light)}
    .message-grid{display:grid;gap:1rem}
    .message-card{background:var(--panel);border:1px solid var(--gold-dim);padding:1.4rem;border-radius:10px;transition:opacity .3s}
    .message-card.deleting{opacity:.4;pointer-events:none}
    .message-head{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:.8rem;margin-bottom:.9rem}
    .message-subject{font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:.18em;color:var(--gold);text-transform:uppercase}
    .message-status{font-size:.75rem;padding:.35rem .75rem;border-radius:999px;background:rgba(201,168,76,.12);color:var(--gold)}
    .message-meta{display:grid;grid-template-columns:repeat(3,minmax(120px,1fr));gap:.75rem;font-size:.84rem;color:var(--soft);margin-bottom:1rem}
    .message-body{color:#f0f0f0;line-height:1.75;white-space:pre-wrap;margin-bottom:1.2rem}
    .message-actions{display:flex;justify-content:flex-end}
    .btn-delete{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;padding:.45rem 1rem;background:transparent;color:var(--red);border:1px solid var(--red);cursor:pointer;border-radius:4px;transition:background .2s,color .2s}
    .btn-delete:hover{background:var(--red);color:#fff}
    .empty-state{padding:2rem;text-align:center;color:var(--soft);background:var(--mid);border:1px dashed var(--gold-dim);border-radius:10px}
    .pw-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.95);color:#fff;z-index:9999;padding:1rem}
    .pw-form{width:100%;max-width:420px;background:#0c1a28;border:1px solid rgba(201,168,76,.3);padding:2rem;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,.4)}
    .pw-input{width:100%;padding:.95rem;margin-bottom:1rem;border:1px solid rgba(201,168,76,.3);border-radius:4px;background:#0a1724;color:#fff;outline:none}
    .pw-submit{width:100%;padding:.95rem;background:#c9a84c;color:#0c1a28;border:none;border-radius:4px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
<div id="pw-lock-screen" class="pw-screen">
  <form id="pw-form" class="pw-form">
    <input id="pw-input" class="pw-input" type="password" autocomplete="current-password" placeholder="Enter password" aria-label="Password" />
    <button type="submit" class="pw-submit"></button>
  </form>
</div>
<div id="page-shell" style="visibility:hidden;">
<div class="top-bar"></div>
<div class="admin-header">
  <a class="admin-logo" href="shop.html">✝ THE ROSARY <span>Contact Admin</span></a>
  <div class="header-actions">
    <a href="rosaryadmin2026.html" class="header-link">Shop Admin →</a>
    <a href="prayer-admin.html" class="header-link">Prayer Admin →</a>
    <a href="index.html" class="header-link">← Home</a>
  </div>
</div>
<div class="page-body">
  <div class="page-title">Contact Messages</div>
  <h1 class="page-heading">Admin View of Contact Submissions</h1>
  <p class="page-intro">Messages submitted from the contact page are saved here so your team can review them from one place.</p>
  <div class="summary-grid">
    <div class="summary-card">
      <span class="summary-label">Total Messages</span>
      <span id="totalCount" class="summary-value">—</span>
    </div>
    <div class="summary-card">
      <span class="summary-label">New</span>
      <span id="newCount" class="summary-value">—</span>
    </div>
    <div class="summary-card" style="display:flex;align-items:center;justify-content:space-between;">
      <span class="summary-label">Refresh</span>
      <button class="btn-refresh" onclick="loadMessages()">↻ Reload</button>
    </div>
  </div>
  <div id="messageGrid" class="message-grid"><div class="empty-state">Loading messages…</div></div>
</div>
</div>

<script>
const BACKEND_URL = 'https://script.google.com/macros/s/AKfycby735wRdH6d-x5EqNM_A7I6GSL-MSFK6zOJsJLZxwQRBSkiM1YU9NKk56maJkfXwq4h/exec';

// ── Load all messages ──────────────────────────────────────────────────────────
async function loadMessages() {
  const grid       = document.getElementById('messageGrid');
  const totalCount = document.getElementById('totalCount');
  const newCount   = document.getElementById('newCount');
  grid.innerHTML   = '<div class="empty-state">Loading messages…</div>';

  try {
    const res  = await fetch(`${BACKEND_URL}?action=getContactMessages`);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      totalCount.textContent = '0';
      newCount.textContent   = '0';
      grid.innerHTML = '<div class="empty-state">No contact messages have been submitted yet.</div>';
      return;
    }

    const sorted = data.slice().sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
    totalCount.textContent = String(sorted.length);
    newCount.textContent   = String(sorted.filter(m => m.status === 'new').length);

    grid.innerHTML = sorted.map(msg => {
      const date = msg.submittedAt
        ? new Date(msg.submittedAt).toLocaleString('en-US', {month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})
        : 'Unknown';
      return `
        <div class="message-card" id="card-${escapeHtml(msg.id)}">
          <div class="message-head">
            <span class="message-subject">${escapeHtml(msg.subject || 'No Subject')}</span>
            <span class="message-status">${msg.status ? msg.status.toUpperCase() : 'NEW'}</span>
          </div>
          <div class="message-meta">
            <span>${escapeHtml(msg.name  || 'Unknown')}</span>
            <span>${escapeHtml(msg.email || '')}</span>
            <span>${date}</span>
          </div>
          <div class="message-body">${escapeHtml(msg.message || '')}</div>
          <div class="message-actions">
            <button class="btn-delete" onclick="deleteMessage('${escapeHtml(msg.id)}')">✕ Delete</button>
          </div>
        </div>`;
    }).join('');

  } catch (err) {
    grid.innerHTML         = '<div class="empty-state">Unable to load contact messages. Please check your backend URL.</div>';
    totalCount.textContent = '—';
    newCount.textContent   = '—';
  }
}

// ── Delete a single message by id ─────────────────────────────────────────────
async function deleteMessage(id) {
  if (!confirm('Delete this message? This cannot be undone.')) return;

  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('deleting');

  try {
    // mode:'no-cors' is required for Google Apps Script from the browser.
    // The response is opaque so we can't read it — we remove the card on
    // any network success and reload to confirm the sheet updated.
    await fetch(BACKEND_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action: 'deleteContactMessage', id })
    });

    // Remove the card from the DOM immediately for instant feedback
    if (card) card.remove();

    // Update the summary counts
    const grid       = document.getElementById('messageGrid');
    const remaining  = grid.querySelectorAll('.message-card').length;
    const newRemain  = grid.querySelectorAll('.message-card .message-status')
                          ? [...grid.querySelectorAll('.message-card .message-status')]
                              .filter(el => el.textContent.trim() === 'NEW').length
                          : 0;

    document.getElementById('totalCount').textContent = String(remaining);
    document.getElementById('newCount').textContent   = String(newRemain);

    if (remaining === 0) {
      grid.innerHTML = '<div class="empty-state">No contact messages have been submitted yet.</div>';
    }

  } catch (err) {
    alert('Could not delete the message. Please try again.');
    if (card) card.classList.remove('deleting');
  }
}

// ── Escape HTML to prevent XSS ────────────────────────────────────────────────
function escapeHtml(text) {
  return String(text)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#39;');
}

// ── Password gate ─────────────────────────────────────────────────────────────
(function () {
  var shell = document.getElementById('page-shell');
  var gate  = document.getElementById('pw-lock-screen');
  var input = document.getElementById('pw-input');
  document.getElementById('pw-form').addEventListener('submit', function (evt) {
    evt.preventDefault();
    if (input.value === 'mylovefortherosary') {
      shell.style.visibility = 'visible';
      gate.style.display     = 'none';
      loadMessages();
    } else {
      window.location.href = 'how-to-pray.html';
    }
  });
  input.focus();
})();
</script>
</body>
</html>
